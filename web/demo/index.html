<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bonsai Native React Demo</title>
    <style>
      :root {
        color: #1f2933;
        background: #f6f7f9;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      button,
      input {
        font: inherit;
      }

      .demo-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        box-sizing: border-box;
      }

      .demo-panel {
        width: min(420px, 100%);
      }

      .demo-panel h1 {
        margin: 0 0 16px;
        font-size: 24px;
        font-weight: 650;
      }

      .demo-surface {
        border: 1px solid #d8dde5;
        border-radius: 8px;
        background: white;
        box-shadow: 0 12px 28px rgb(15 23 42 / 8%);
      }

      .demo-stack {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .demo-stack-row {
        flex-direction: row;
        align-items: center;
      }

      .demo-text {
        margin: 0;
        font-size: 32px;
        line-height: 1.2;
        font-variant-numeric: tabular-nums;
      }

      .demo-button {
        min-height: 36px;
        padding: 0 14px;
        border: 1px solid #24476f;
        border-radius: 6px;
        color: white;
        background: #2f5d8c;
        cursor: pointer;
      }

      .demo-button:disabled {
        cursor: default;
        opacity: 0.5;
      }

      .demo-input {
        min-height: 36px;
        box-sizing: border-box;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 0 10px;
      }

      .demo-list {
        overflow: auto;
      }

      .demo-row {
        border-bottom: 1px solid #edf0f5;
        padding: 8px 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./dist/web/demo/main.js"></script>
  </body>
</html>
